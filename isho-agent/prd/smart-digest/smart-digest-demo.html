<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iSho Smart Digest Prototype</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-page: rgb(236,243,253);
    --text-primary: #000;
    --text-secondary: rgba(0,0,0,0.6);
    --card-gradient: linear-gradient(180deg, rgb(236,250,251) 0%, rgb(238,234,243) 100%);
    --card-shadow: 0 4px 18px rgba(217,232,249,1);
    --energy-gradient: linear-gradient(180deg, rgb(223,249,255) 0%, rgb(239,255,254) 100%);
    --energy-shadow: 0 16px 58px rgba(217,232,249,0.51);
    --icon-bg: rgb(227,234,252);
    --icon-inner: linear-gradient(180deg, rgb(205,227,231) 0%, rgb(215,226,249) 100%);
    --bottom-gradient: linear-gradient(180deg, rgb(220,227,253) 0%, rgb(220,227,253) 100%);
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  }

  body {
    font-family: var(--font);
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
    gap: 40px;
  }

  /* ── Control Panel ── */
  .control-panel {
    background: #2C2C2E;
    padding: 24px;
    border-radius: 20px;
    width: 300px;
    color: #fff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .control-panel h3 { margin-bottom: 16px; font-size: 16px; font-weight: 600; }
  .control-group { display: flex; flex-direction: column; gap: 10px; }
  .scene-btn {
    background: #3A3A3C;
    border: 1px solid #48484A;
    color: #E5E5EA;
    padding: 12px 14px;
    border-radius: 12px;
    text-align: left;
    cursor: pointer;
    font-size: 14px;
    font-family: var(--font);
    transition: all 0.2s;
  }
  .scene-btn:hover { background: #48484A; }
  .scene-btn.active {
    background: rgba(52, 199, 89, 0.15);
    border-color: #34C759;
    color: #34C759;
    font-weight: 500;
  }
  .scene-btn span { display: block; font-size: 11px; color: #8E8E93; margin-top: 4px; line-height: 1.4; }
  .scene-btn.active span { color: rgba(52, 199, 89, 0.7); }

  /* ── iPhone Frame ── */
  .iphone-frame {
    width: 393px;
    height: 852px;
    border-radius: 50px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 0 3px #2C2C2E, 0 0 0 6px #1a1a1a, 0 20px 60px rgba(0,0,0,0.6);
  }

  /* ── Background layer (matches Figma bg group) ── */
  .bg-layer {
    position: absolute;
    inset: 0;
    background: rgb(236,243,253);
    overflow: hidden;
    z-index: 0;
  }
  .bg-blob-1 {
    position: absolute;
    width: 408px;
    height: 234px;
    top: -116px;
    left: 89px;
    background: rgb(190,241,248);
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.7;
  }
  .bg-blob-2 {
    position: absolute;
    width: 142px;
    height: 142px;
    top: -68px;
    left: 55px;
    background: rgb(211,249,240);
    border-radius: 50%;
    filter: blur(30px);
    opacity: 0.8;
  }
  .bg-blob-3 {
    position: absolute;
    width: 142px;
    height: 142px;
    top: -78px;
    left: -45px;
    background: rgb(252,238,224);
    border-radius: 50%;
    filter: blur(30px);
    opacity: 0.8;
  }
  .bg-blob-4 {
    position: absolute;
    width: 640px;
    height: 444px;
    bottom: -100px;
    left: -157px;
    background: rgb(220,227,253);
    border-radius: 40%;
    filter: blur(50px);
    opacity: 0.5;
  }

  /* ── Status Bar ── */
  .status-bar {
    height: 62px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 24px 10px;
    position: relative;
    z-index: 10;
  }
  .status-bar .time { font-size: 17px; font-weight: 590; color: #000; }
  .status-bar .icons { display: flex; gap: 6px; align-items: center; }
  .status-bar .icons svg { width: 18px; height: 12px; fill: #000; }
  .dynamic-island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 36px;
    background: #000;
    border-radius: 20px;
    z-index: 20;
  }

  /* ── Homepage Content ── */
  .homepage {
    flex: 1;
    padding: 16px 20px 0;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
    overflow-y: auto;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .homepage::-webkit-scrollbar { display: none; }

  .greeting-title {
    font-size: 32px;
    font-weight: 600;
    color: #000;
    line-height: 40px;
    margin-bottom: 8px;
    transition: opacity 0.3s;
  }
  .digest-text {
    font-size: 14px;
    line-height: 22px;
    color: rgba(0,0,0,0.6);
    font-weight: 400;
    margin-bottom: 24px;
    transition: opacity 0.3s, transform 0.3s;
  }

  /* ── Data Cards Row (Sleep / HR / Calories) ── */
  .data-cards-row {
    display: flex;
    gap: 11px;
    margin-bottom: 12px;
  }
  .data-card {
    width: 110px;
    height: 96px;
    background: var(--card-gradient);
    border: 1px solid #fff;
    border-radius: 24px;
    box-shadow: var(--card-shadow);
    position: relative;
    overflow: hidden;
    padding: 13px 0 0 13px;
  }
  .data-card .icon-outer {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .data-card .icon-inner {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--icon-inner);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .data-card .metric-val {
    position: absolute;
    right: 10px;
    bottom: 8px;
    font-size: 20px;
    font-weight: 500;
    color: #000;
    line-height: 28px;
  }
  .data-card .metric-label {
    position: absolute;
    left: 16px;
    bottom: 12px;
    font-size: 12px;
    font-weight: 400;
    color: #000;
    line-height: 16px;
  }

  /* ── Energy Card ── */
  .energy-card {
    background: var(--energy-gradient);
    border: 1px solid #fff;
    border-radius: 24px;
    box-shadow: var(--energy-shadow);
    padding: 14px 16px;
    margin-bottom: 12px;
    position: relative;
  }
  .energy-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }
  .energy-title { font-size: 14px; font-weight: 500; color: #000; line-height: 20px; }
  .energy-remain { text-align: right; }
  .energy-remain-label { font-size: 12px; color: rgba(0,0,0,0.6); line-height: 16px; }
  .energy-remain-val { font-size: 16px; font-weight: 500; color: rgba(0,0,0,0.9); line-height: 24px; }

  .energy-chart {
    height: 56px;
    position: relative;
    margin-bottom: 4px;
  }
  .energy-chart svg { width: 100%; height: 100%; }

  .energy-divider {
    height: 1px;
    background: rgba(0,0,0,0.04);
    margin: 8px 0;
  }
  .energy-times {
    display: flex;
    gap: 40px;
    padding-left: 8px;
  }
  .energy-time {
    font-size: 12px;
    font-weight: 400;
    color: rgba(0,0,0,0.9);
    line-height: 16px;
  }

  /* ── Info Row Cards (Sleep Window / Sleep Analysis) ── */
  .info-row {
    background: #fff;
    border: 1px solid #fff;
    border-radius: 16px;
    height: 64px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    margin-bottom: 12px;
  }
  .info-row-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--icon-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
  }
  .info-row-label {
    font-size: 14px;
    font-weight: 500;
    color: #000;
    line-height: 20px;
    margin-left: 8px;
  }
  .info-row-right {
    margin-left: auto;
    text-align: right;
  }
  .info-row-sublabel {
    font-size: 12px;
    color: rgba(0,0,0,0.6);
    line-height: 16px;
  }
  .info-row-value {
    font-size: 24px;
    font-weight: 500;
    color: #000;
    line-height: 32px;
  }

  /* Sleep bars mini chart */
  .sleep-bars {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    height: 40px;
    margin-left: auto;
  }
  .sleep-bar {
    width: 6px;
    border-radius: 3px;
    background: rgb(202,165,243);
  }

  /* ── Quick Questions ── */
  .quick-questions {
    display: flex;
    flex-direction: row;
    gap: 8px;
    margin-bottom: 12px;
    overflow-x: auto;
    -ms-overflow-style: none;
    scrollbar-width: none;
    transition: opacity 0.3s, transform 0.3s;
  }
  .quick-questions::-webkit-scrollbar { display: none; }
  .qq-btn {
    flex-shrink: 0;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.9);
    color: #000;
    padding: 10px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(217,232,249,0.4);
    transition: all 0.2s;
    line-height: 1.4;
    font-family: var(--font);
  }
  .qq-btn:hover {
    background: #fff;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(217,232,249,0.6);
  }
  .qq-btn:active { transform: scale(0.98); }

  /* ── Bottom Input Bar ── */
  .bottom-bar {
    position: relative;
    z-index: 10;
    background: var(--bottom-gradient);
    padding: 12px 20px 36px;
  }
  .input-wrapper {
    background: #fff;
    border: 1px solid #fff;
    border-radius: 32px;
    height: 48px;
    display: flex;
    align-items: center;
    padding: 0 8px 0 12px;
  }
  .input-sparkle {
    width: 20px;
    height: 18px;
    flex-shrink: 0;
  }
  .input-field {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 14px;
    color: #000;
    outline: none;
    font-family: var(--font);
    margin-left: 8px;
    opacity: 0.35;
  }
  .input-field::placeholder { color: #000; }
  .input-send {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(0,0,0,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
  }
  .input-send svg { width: 12px; height: 12px; fill: none; stroke: #fff; stroke-width: 2; }

  /* ── Animations ── */
  .fade-enter-active { opacity: 1; transform: translateY(0); }
  .fade-exit-active { opacity: 0; transform: translateY(-10px); }
</style>
</head>

const $ = id => document.getElementById(id);
const btnGroup = $('btn-group');

SCENES.forEach((scene, i) => {
  const btn = document.createElement('button');
  btn.className = `scene-btn ${i === 0 ? 'active' : ''}`;
  btn.innerHTML = `${scene.name} <span>${scene.desc}</span>`;
  btn.onclick = () => {
    document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyScene(scene);
  };
  btnGroup.appendChild(btn);
});

function applyScene(s) {
  $('sys-time').textContent = s.time;
  $('greeting').textContent = s.greeting;

  const digestEl = $('digest');
  digestEl.textContent = s.digest;
  digestEl.style.display = s.digest ? 'block' : 'none';

  $('metric-sleep').textContent = s.metrics.sleep;
  $('metric-hr').textContent = s.metrics.hr;
  $('metric-cal').textContent = s.metrics.cal;

  $('energy-label').textContent = s.energy.label;
  $('energy-val').textContent = s.energy.val;
  $('time-slot-1').textContent = s.energy.slot1;
  $('time-slot-2').textContent = s.energy.slot2;

  $('info-label-1').textContent = s.info1.label;
  $('info-sublabel-1').textContent = s.info1.sublabel;
  $('info-value-1').textContent = s.info1.value;

  // Quick Questions
  const qqContainer = $('quick-questions');
  qqContainer.innerHTML = '';
  if (s.questions && s.questions.length > 0 && s.digest) {
    qqContainer.style.display = 'flex';
    s.questions.forEach(q => {
      const btn = document.createElement('div');
      btn.className = 'qq-btn';
      btn.textContent = q;
      qqContainer.appendChild(btn);
    });
  } else {
    qqContainer.style.display = 'none';
  }
}

applyScene(SCENES[0]);
</script>
