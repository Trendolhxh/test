    判断: 暂不推, 等工作日作息稳定后视情况提

# [active]
主线方向: 减少睡前手机使用 → 建立screen-off到入睡的过渡环节
核心逻辑: 入睡能力没问题(15min), 瓶颈是"放不下手机"→上床太晚→时长不够
活跃干预:
  - [手机放客厅] 每晚23:00闹钟提醒放手机到客厅充电
    开始: 3.23, 状态: 待反馈
    试跑数据(3.20-3.22): 执行2/3天, 入睡提前45min, 深睡+3%, 加班日未执行
    触发: App推送(23:00)
    已知阻力: 加班日太晚回来→没精力执行; 用手机当闹钟(已购小闹钟替代)
  - [遮光窗帘] 已安装(3.19), 已固化
    效果: 周末晨光干扰消除, 自然醒更稳定
下一步:
  路径A(手机放客厅有效):
    → 稳定1周后提醒从23:00→22:30
    → 空出时间引入替代活动(听播客/纸质书/泡脚)
  路径B(无效或放弃):
    → iOS屏幕时间限制(22:30后锁短视频App)
    → 或手机调灰度(降低屏幕吸引力)
  长期: 建立wind-down routine(目标22:30 screen-off→轻松活动→23:30入睡)

