    原话: "下午必须靠咖啡撑着, 不喝真的会困死"
    记录于3.18, 讨论咖啡对深睡影响时明确拒绝
  - 早起运动/晨跑
    原话: "早上根本起不来, 别跟我说晨跑"
    记录于3.15, 语气较强烈
软约束(有顾虑但未完全拒绝):
