# [preferences]
- 偏好"一步到位"物理手段(遮光窗帘/放手机到客厅), 不喜欢需要持续自控的方法
- 加班日/状态差时执行力低, 不应在这些日子设高要求
- 看到数据改善(深睡+3%)后明显更积极, 数据是核心驱动力
- 需要外部提醒(闹钟/推送), 单靠"自己记得"大概率做不到
