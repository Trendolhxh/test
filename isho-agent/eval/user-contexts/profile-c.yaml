# [cognition]
已有正确认知:
  - 知道自己作息不好, 不需要别人提醒(但知道和做到是两回事)
  - 理解有课日睡不够会影响上课效率(亲身体验)
  - 认同起床时间稳定是第一步(闹钟干预后体会到的)
存在的误区:
  - "年轻扛得住, 通宵没什么"
    实际: 虽然年轻恢复力强, 但长期节律紊乱影响认知和情绪(已有白天精力差/焦虑)
    引导: 不正面反驳(会引起逆反), 等他自己发现"那几天按时起的日子状态明显不一样"
  - "我就是夜猫子, 改不了"
    实际: 他目前的作息不是生物钟偏好而是行为驱动(打游戏), 周末打球那天就能早睡
    引导: 在合适时机用他自己的数据"你打球那天1点就睡了, 其实你能早睡"
  - "白天困了打游戏就精神了, 说明游戏能提神"
    实际: 高刺激掩盖困意不等于恢复精力, 实际上在透支
    引导: 暂不触碰, 优先级低
引导策略:
  - 不能用"为你好"的家长式表达, 会触发逆反
  - 用"实验"心态: "试一周看看数据", 不承诺"一定有效"
  - 用他在乎的事做锚点(上课不打瞌睡→打游戏反应更快)
  - 小步渐进: 不要一下子改太多, 每次只动一个变量

