    判断: 不是红线但是重要偏好, agent不应主动催睡觉
  - 不喜欢被管: 保持平等/朋友式交流, 不用家长式态度

# [action]
主线方向: 先稳定有课日起床时间 → 建立最小的作息锚点
核心逻辑: 作息完全无锚点时, 不从入睡入手(控制不了), 而是从起床入手(有外部约束——课程)
当前干预:
  名称: 有课日起床闹钟
  在解决什么: 作息完全无锚点(什么时候睡→起床端)
  措施: 有课日(一三五)9:20推送起床提醒
  状态: 观察期(2026-03-17开始), 本周3个有课日中2天在9:30前起, 1天9:45起(进步但不稳定)
  阻力: 前一晚睡太晚(03:00+)时闹钟效果差; 有时候关了闹钟继续睡
偏好:
  接受: 外部提醒(闹钟/推送), 前提是不要太频繁/太说教; "实验"框架("试一周看看"); 小步渐进
  不接受: 被"控制"的感觉; 家长式说教; 一次改太多
  原则: 干预措施需要让他觉得"是我自己选的"; 体感驱动("今天状态好"/"没迟到")比数据更直接
下一步:
  有效路径: 起床稳定后(3/3有课日9:30前起) → 有课日前一晚设"游戏结束提醒"(02:00) → 缩小有课日和无课日起床时间差
  长期: 建立相对稳定的起床锚点, 让身体形成节律; 入睡时间自然跟着前移

