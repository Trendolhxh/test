# [summary]
21岁男/大三计算机/无固定作息/宿舍 | 核心问题:打游戏→日夜颠倒→有课日严重睡眠不足 | 阶段:首次干预,有课日起床闹钟刚开始 | 红线:无 | 沟通风格:随意直接,偶尔用表情包,不喜欢被管

# [routines]
有课日(周一三五):
  第一节课10:00, 需9:40到教室
  通常前一晚打游戏到02:00-03:00, 闹钟9:20, 经常踩点甚至迟到
  上午课上频繁打瞌睡, 中午食堂吃饭
  下午无课→回宿舍打游戏(英雄联盟/永劫无间), 一打就是3-4小时
  晚饭食堂或外卖, 饭后继续打游戏
  23:00-24:00 偶尔看看书/刷手机, 但很快回到游戏
  02:00-03:00 结束游戏, 刷一会手机, ~03:30入睡
无课日(周二四):
  无闹钟, 自然醒11:00-12:00
  下午打游戏, 晚上继续, 凌晨03:00-04:00入睡
  全天可能只出宿舍一次(吃饭)
周末:
  经常通宵(周五晚→周六早上06:00-07:00), 然后睡到14:00-15:00
  周六晚同样晚睡(03:00-04:00)
  偶尔和同学出去吃饭/打球, 也是晚归
  周日晚有时焦虑周一的课, 但不影响游戏时间
备注:
  - 游戏是主要社交方式, 和室友/线上朋友组队
  - 宿舍4人间, 其中2个室友作息同样混乱, 1个相对规律(但不影响其他人)
  - 经常外卖, 饮食时间随游戏节奏走

# [sleep_strengths]
- 入睡速度快: 一旦决定睡了, 5-10min内入睡(年轻体质)
- 睡眠连续性好: 睡着后不醒, 闹钟响才起(深睡能力正常)
- 周末总睡眠时长其实够(8-9h, 虽然时段不对)
- 有改变意愿: 自己下载了App, 表示"想试试改一改"
- 近期有课日起床时间开始稳定(闹钟干预初见效果)

# [sleep_issues]
- 完全没有固定作息, 每日入睡/起床波动3-4小时
  ← 有课/无课日作息差异巨大(入睡差1-2h, 起床差3h)
  ← 无任何外部约束时(无课/周末)自然滑向通宵
  ← 生物钟严重紊乱, 昼夜节律极不稳定
- 有课日睡眠严重不足(均5-6h)
  ← 03:00+入睡但9:20必须起
  ← 入睡晚的直接原因是打游戏停不下来
  ← 游戏的"再来一把"机制 + 社交压力(队友还在打)
  ← 深层: 游戏是主要娱乐/社交/成就感来源, 没有替代活动
- 白天精力极差(有课日)
  ← 上午上课打瞌睡→下午靠游戏提神(高刺激活动掩盖困意)
  ← 形成恶性循环: 精力差→靠游戏→睡更晚→精力更差
- 周末通宵加剧节律紊乱
  ← 通宵后的补觉将起床时间推到下午→当晚又无法正常入睡
  ← 每周一是节律紊乱最严重的一天

