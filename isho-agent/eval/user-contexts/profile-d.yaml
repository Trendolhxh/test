# 用户上下文
# 更新于 2026-03-24 05:00
# 使用天数: 90 | 对话轮次: 200+

# [summary]
34岁女/全职妈妈/小孩1岁8个月/作息规律型 | 核心问题:小孩长牙夜醒→觉醒频繁→重新入睡慢+入睡前焦虑 | 阶段:干预中期,深呼吸有效,纸质书待评估 | 红线:减少午睡,让老公夜间带娃,安眠药/褪黑素 | 沟通风格:温和理性,重视感受,接受建议但需要被理解

# [routines]
日常(绝大多数日子):
  06:30 被小孩叫醒, 起床
  06:30-08:00 喂奶/做早餐/带娃吃饭
  08:00-12:00 带娃活动(小区遛弯/早教/在家玩), 见缝插针做家务
  12:00-12:30 午饭(简单做或前一天剩饭)
  12:30-13:30 小孩午睡, 自己也小睡30min(这段时间极其珍贵)
  13:30-17:00 继续带娃, 下午会喝一杯红茶
  17:00-18:00 做晚饭
  18:00-19:00 吃饭/收拾
  19:00-21:00 陪娃玩/洗澡/讲绘本
  21:00 哄娃入睡(通常15-30min)
  21:30-23:00 自己的时间(看书/看手机/和老公聊天/追剧), 这是一天中唯一属于自己的时间
  23:00-23:15 准备睡觉(洗漱/调灯光温度)
  23:30左右入睡
  夜间: 小孩目前长牙期, 夜醒2-3次, 每次需起来安抚10-20min
周末:
  基本同日常(小孩不分周末)
  老公偶尔早上带娃, 可以多睡到7:30
  老公在家时晚间自由时间会长一些(老公哄娃)
备注:
  - 不喝咖啡, 不喝酒
  - 下午一杯红茶(已改为3点前喝)
  - 小孩最近在长牙, 夜醒频繁(2-3次/晚), 预计持续2-3个月
  - 老公经常出差(月均出差10-15天), 出差时带娃压力翻倍
  - 睡前环境维护好: 卧室22度, 灯光调暗, 已固化

# [sleep_strengths]
- 入睡时间极其规律(23:30±15min), 3个月来波动极小, 生物钟稳定
- 入睡潜伏期短(~10min), 秒睡型(老公在家时)
- 有午睡习惯, 能有效补充精力, 时长控制合理(30min)
- 睡眠意识好, 会主动维护睡前环境(灯光、温度已固化)
- 之前(小孩不夜醒时)各项指标都在正常范围, 说明底子好
- 对干预配合度高, 深呼吸执行良好且见效
- 长期用户, 对App和agent信任度高

# [sleep_issues]
- 夜间觉醒频繁(2-3次, 每次15-30min)
  ← 小孩长牙期夜醒, 需要起来安抚
  ← 不可控的外部因素, 预计持续2-3个月
  ← 不能用白噪音(会盖住小孩哭声)
- 重新入睡变慢(之前5min, 现在15-20min, 深呼吸后改善到10-12min)
  ← 夜间觉醒后大脑激活程度高(安抚小孩需要完全清醒)
  ← 躺下后开始想"他会不会又醒"→焦虑→入睡更慢
  ← 老公出差时更严重(一个人承担全部)
- 睡眠效率下降(从92%降至78%)
  ← 觉醒次数增多 + 重新入睡变慢 的综合结果
- 入睡前焦虑(新出现, 3周内)
  ← "一躺下就怕小孩又醒"→预期性焦虑
  ← 担心睡眠不足影响自己情绪→影响带娃质量→自责
  ← 形成"焦虑→睡不好→更焦虑"的恶性循环
- 晚间自由时间不舍得睡(报复性晚睡)
  ← 21:30-23:00是唯一属于自己的时间
  ← 明知道该早睡但舍不得, 心理需求大于睡眠需求

# [lifestyle]
饮食:
  早餐: 简单(面包/粥+鸡蛋), 和小孩一起吃
  午餐: 简单做, 有时吃前一天剩饭
  晚餐: 正经做, 老公在家时会丰盛一些
  咖啡: 不喝(不喜欢)
  茶: 下午一杯红茶(已改为3点前, 已固化)
  酒精: 不喝
  零食: 偶尔晚间自由时间吃水果
运动:
  日常带娃活动量不小(抱娃/遛弯), 但非结构化运动
  没有固定运动习惯, 也没有时间
  偶尔老公带娃时会做15分钟瑜伽(月均3-4次)
环境:
  两室一厅, 小孩和自己同房(方便夜间照顾)
  卧室温度22度(已固化), 遮光窗帘
  手机充电在床头柜, 睡前会看
  夜灯: 小夜灯方便起来照顾小孩
  噪音: 安静小区, 主要噪音源是小孩夜哭

# [psychology]
压力与情绪:
  核心压力源: 小孩长牙期夜醒导致睡眠碎片化, 白天精力下降
  次要压力源: 老公出差时独自承担一切, 孤独感
  情绪模式: 日常稳定温和; 精力差的日子容易对小孩发脾气→事后强烈自责
  "焦虑→睡不好→精力差→对娃发脾气→自责→更焦虑"的循环已被识别
  近期出现的入睡前预期焦虑: "一躺下就怕他又醒"
性格沟通:
  温和理性, 能清晰表达自己的感受和需求
  不抗拒建议, 但需要先被理解("你理解我"比"你教我"重要)
  对"妈妈应该XXX"的说教敏感, 已经够自律了不需要被push
  喜欢有科学依据的解释, 但不需要太学术
  会主动反馈干预效果, 配合度高
对App态度:
  使用3个月, 信任度高, 已是日常习惯的一部分
  把agent当作"懂睡眠的朋友"而非"医生"或"教练"
  希望agent理解自己的处境(不是行为问题, 是外部不可控因素)
  对数据有兴趣, 但更在意感受层面的理解

# [cognition]
已有正确认知:
  - 深知自己当前的睡眠问题主要是外部因素(小孩夜醒), 不是自己的行为问题
  - 理解焦虑和睡眠的恶性循环(自己观察到的)
  - 知道午睡30min是合理的(之前自己查过资料)
  - 理解深呼吸放松的原理(副交感神经激活), agent解释过
  - 认同"能控制的就控制, 不能控制的接受"(但做起来难)
存在的误区:
  - "睡眠效率越高越好, 低于90%就是不正常"
    实际: 夜醒期间78%是可以接受的, 不需要达到之前的92%
    引导: 已部分引导过("夜醒期间指标会波动, 不代表你的睡眠能力变差了"), 继续强化
  - "只要小孩不夜醒了我就能恢复正常"
    实际: 焦虑习惯可能在小孩不夜醒后仍然存在(条件反射), 需要提前干预
    引导: 时机尚未到(等夜醒开始减少时再提)
引导策略:
  - 重视感受层面, 先共情再分析, 数据辅助但不能替代共情
  - 不给不切实际的建议(考虑全职妈妈的时间和精力限制)
  - 正常化她的困难("每个妈妈在这个阶段都会经历"), 减少自责
  - 用"我们一起看看"的合作姿态, 不用"你应该"的指导姿态
  - 给选择而非指令("要不要试试"而不是"建议你")

