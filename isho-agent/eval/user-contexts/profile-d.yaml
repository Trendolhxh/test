  纸质书(3/7天): 入睡潜伏期均9min vs 手机日15min(样本小, 待观察)

# [redlines]
- 减少午睡: 原话"午睡是我唯一能喘口气的时间, 你让我不睡午觉我白天更撑不住"
  判断: 硬红线, 绝不提及
- 让老公夜间带娃: 原话"他出差多, 在家的时候我不想给他加压, 而且他带娃我也睡不安稳"
  判断: 硬红线, 不建议分担夜间照顾
- 安眠药/褪黑素: 原话"在哺乳期, 不想吃任何药, 网上说褪黑素也不确定安不安全"
  判断: 硬红线, 不建议任何药物/补剂
注意事项:
  - 不要暗示她的睡眠问题是因为自己的行为("你可以做得更好")
  - 不要拿数据给她施压("你的效率只有78%")
  - 出差日不要提及老公

# [action]
主线方向: 改善夜间重新入睡能力 + 缓解入睡前焦虑
核心逻辑: 夜醒是不可控的(小孩长牙), 能优化的是醒来后多快重新入睡 + 减少预期性焦虑
当前干预:
  - 名称: 深呼吸
    在解决什么: 夜间重新入睡慢(睡眠质量→夜间觉醒后)
    措施: 夜间安抚小孩后做3次深呼吸再躺下
    状态: 有效, 持续中(2026-03-20开始), 执行日重新入睡均10min(vs未执行日18min)
    阻力: 有时太累忘了直接躺下
  - 名称: 睡前纸质书
    在解决什么: 入睡前焦虑+手机刺激(睡眠质量→入睡前状态)
    措施: 睡前15分钟放下手机看纸质书
    状态: 观察期(2026-03-22开始), 执行3/7天, 入睡潜伏期9min vs 手机日15min(样本小)
    阻力: 哄娃特别累的日子不想看书, 直接刷手机放空
偏好:
  接受: 行为调整类干预(呼吸/阅读/环境/习惯), "试试看"框架
  不接受: 药物/补剂(哺乳期硬约束), "必须坚持"的压力
  原则: 考虑全职妈妈时间限制; 做不到时需要被理解而非被push; 数据和感受并重, 更在意"我感觉怎么样"; 信任基于"你懂我"而非"你很专业"
下一步:
  有效路径: 深呼吸固化 → 加入渐进式肌肉放松(PMR)强化 → 引入"担忧日记"针对入睡前焦虑
  纸质书: 再观察一周, 累的日子做不到可调整为"至少不看焦虑内容"
  长期: 持续陪伴度过长牙期, 在不可控因素消退后评估焦虑是否残留

# [history]
- 深呼吸(3.20-至今, 有效持续中):
  重新入睡时间从20min缩短到10-12min, 用户反馈"脑子没那么乱"
  学习: 简单的身体放松对这个用户有效, 她执行力好
- 睡前看纸质书(3.22-至今, 观察期):
  执行率约50%, 用户反馈"比刷手机确实平静一些"
  学习: 执行率受当天疲劳度影响, 需要降低门槛或接受部分执行
- 减少午睡(3.15): 用户拒绝 → 硬红线
  用户反应强烈, 学习: 午睡对她是心理和生理双重刚需
- 让老公夜间带娃(3.12): 用户拒绝 → 硬红线
  学习: 涉及家庭关系, 不应从外部推动
- 安眠药/褪黑素(3.10): 用户拒绝 → 硬红线
  学习: 哺乳期用户对任何药物极其谨慎, 完全尊重
- 睡前热水泡脚(3.08-至今, 自主继续):
  执行2周, 轻微有效, 用户觉得舒服, 已自主固化为习惯
- 卧室温度22度(3.05-至今, 已固化):
  有效, 用户自己调了温控, 已成为基线条件
- 白噪音app(3.01-3.05, 停用):
  无效, 关键原因: 会盖住小孩哭声, 对夜醒期妈妈完全不适用
  学习: 方案设计必须考虑带娃妈妈的特殊约束
- 限制晚间红茶(2.25-至今, 已固化):
  改为下午3点前喝, 入睡潜伏期无明显变化(本来就短), 但作为好习惯保留
- 21:30后不看焦虑内容(2.20-至今, 已固化):
  有效, 减少了睡前认知激活, 用户自觉执行
