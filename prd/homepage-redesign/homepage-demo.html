// ══════════════════════════════════════════
// RENDER: Vertical Timeline (Today Tab)
// ══════════════════════════════════════════
var HOUR_H = 70; // pixels per hour

// Catmull-Rom spline → cubic Bezier SVG path
function catmullRomPath(points) {
  if (points.length < 2) return '';
  var d = 'M' + points[0][0].toFixed(1) + ',' + points[0][1].toFixed(1);
  for (var i = 0; i < points.length - 1; i++) {
    var p0 = points[Math.max(0, i - 1)];
    var p1 = points[i];
    var p2 = points[i + 1];
    var p3 = points[Math.min(points.length - 1, i + 2)];
    var cp1x = p1[0] + (p2[0] - p0[0]) / 6;
    var cp1y = p1[1] + (p2[1] - p0[1]) / 6;
    var cp2x = p2[0] - (p3[0] - p1[0]) / 6;
    var cp2y = p2[1] - (p3[1] - p1[1]) / 6;
    d += ' C' + cp1x.toFixed(1) + ',' + cp1y.toFixed(1) +
         ' ' + cp2x.toFixed(1) + ',' + cp2y.toFixed(1) +
         ' ' + p2[0].toFixed(1) + ',' + p2[1].toFixed(1);
  }
  return d;
}

// ── 今日特色一句话（PRD §7.3） · 按场景 id 映射 ──
var TODAY_HIGHLIGHT_MAP = {
  morning_good:       { icon: '⚡', text: '今天高能总长 <b>7.5h</b>，比昨天多 0.3h——重点事放进 <b>09:30–11:45</b> 或 <b>18:45–21:10</b>' },
  morning_bad:        { icon: '⚠️', text: '今天高能比昨天 <b>少 1.8h</b>，关键事 <b>11:00 前</b>做完' },
  afternoon_high:     { icon: '✨', text: '还剩 <b>4 小时高能</b>，<b>14:00–16:00</b> 是今天的主场' },
  afternoon_depleted: { icon: '🪫', text: '高能时段已基本走完，下午建议安排 <b>轻任务</b> 或 <b>小睡</b>' },
  evening_low:        { icon: '🌙', text: '今天活动量偏低——<b>18 点后</b>精力会持续下滑，重要事别拖到晚间' }
};

// ── 根据建议 icon/label/time 推导因果短语（PRD §7.4） ──
function deriveCause(sug) {
  var labelMap = {
    '喝咖啡':    '保住上午高能',
    '运动':      '延长晚间高能',
    '小睡':      '填平下午低谷',
    '冥想':      '帮助晚间放松',
    '准备入睡':  '保住明日高能'
  };
  // 咖啡根据时间可微调
  if (sug.label === '喝咖啡') {
    var startMin = timeToMinutes((sug.time || '10:00').split(' ')[0]);
    if (startMin >= 12 * 60) return '续力下午';
  }
  return labelMap[sug.label] || '';
}

function renderTodayHighlight(scene) {
  var slot = $('today-highlight-slot');
  if (!slot) return;
  var item = TODAY_HIGHLIGHT_MAP[scene.id];
  if (!item || !scene.energyCurve || !scene.energyCurve.length) {
    slot.innerHTML = '';
    return;
  }
  slot.innerHTML =
    '<div class="today-highlight">' +
      '<span class="today-highlight-icon">' + item.icon + '</span>' +
      '<span class="today-highlight-text">' + item.text + '</span>' +
    '</div>';
}

function renderVerticalTimeline(scene) {
  var container = $('v-timeline');
  var badge = $('timeline-badge');

  // 顶部「今日特色」总结（PRD §7.3）
  renderTodayHighlight(scene);

  // Empty state
  if (!scene.energyCurve || !scene.energyCurve.length) {
    container.innerHTML =
      '<div class="empty-state" style="padding:40px 16px">' +
        '<div class="empty-state-icon">📋</div>' +
        '<div class="empty-state-title">暂无时间轴数据</div>' +
        '<div class="empty-state-desc">连接设备后查看 24h 能量时间轴</div>' +
      '</div>';
    badge.textContent = '--';
    badge.className = 'timeline-state-badge';
    return;
  }

  // Badge —— v0.4 用户面标签（PRD §5.3）：今天计划 / 当前 / 今日回顾
  var stateMap = { predictive: '今天计划', realtime: '当前', review: '今日回顾' };
  badge.textContent = stateMap[scene.timelineState] || '';
  badge.className = 'timeline-state-badge ' + scene.timelineState;

  // Timeline range
  var sleepEndH = timeToMinutes(scene.sleepEnd) / 60;
  var swTime = scene.sleepWindow.time;
  var swH = swTime !== '--:--' ? timeToMinutes(swTime) / 60 : 23;
  var endH = Math.min(swH + 1, 24);
  var totalPx = endH * HOUR_H;
  var curMin = timeToMinutes(scene.curveCurrentTime);

  // SVG coordinate space
  var svgW = 300;
  var curveMaxX = svgW * 0.55;
  var curveMinX = 8;

  var html = '';

  // ── Hour labels & tick lines ──
  for (var h = 0; h <= endH; h++) {
    var y = h * HOUR_H;
    html += '<div class="v-hour-label" style="top:' + y + 'px">' +
      String(h % 24).padStart(2, '0') + '</div>';
    html += '<div class="v-hour-tick" style="top:' + y + 'px"></div>';
  }

  // ── SVG energy overlay ──
  var svg = '<svg class="v-energy-svg" width="100%" height="' + totalPx +
    '" viewBox="0 0 ' + svgW + ' ' + totalPx + '" preserveAspectRatio="none">';

  // Clip paths for realtime split (solid past / dashed future)
  if (scene.timelineState === 'realtime') {
    var nowSvgY = (curMin / 60) * HOUR_H;
    svg += '<defs>' +
      '<clipPath id="clip-past"><rect x="0" y="0" width="' + svgW +
        '" height="' + nowSvgY.toFixed(1) + '"/></clipPath>' +
      '<clipPath id="clip-future"><rect x="0" y="' + nowSvgY.toFixed(1) +
        '" width="' + svgW + '" height="' + (totalPx - nowSvgY).toFixed(1) +
        '"/></clipPath></defs>';
  }

  // Sleep band (midnight → sleepEnd)
  var sleepBandH = sleepEndH * HOUR_H;
  svg += '<rect class="sleep-band" x="0" y="0" width="' + svgW +
    '" height="' + sleepBandH.toFixed(1) + '" rx="10"/>';

  // High-energy bands (green highlights)
  (scene.highWindows || []).forEach(function(w) {
    var y1 = (timeToMinutes(w.start) / 60) * HOUR_H;
    var y2 = (timeToMinutes(w.end) / 60) * HOUR_H;
    svg += '<rect class="high-band" x="0" y="' + y1.toFixed(1) +
      '" width="' + svgW + '" height="' + (y2 - y1).toFixed(1) + '" rx="10"/>';
  });

  // Sleep window band
  if (swTime !== '--:--') {
    var swBandY = swH * HOUR_H;
    svg += '<rect class="sleep-window-band" x="0" y="' + swBandY.toFixed(1) +
      '" width="' + svgW + '" height="' + HOUR_H + '" rx="10"/>';
  }

  // Energy curve: map [hour, value] → [x, y] in SVG coords
  var curvePoints = [];
  scene.energyCurve.forEach(function(pt) {
    var hour = pt[0], val = pt[1];
    if (hour >= 0 && hour <= endH) {
      var py = hour * HOUR_H;
      var px = curveMinX + (val / 100) * (curveMaxX - curveMinX);
      curvePoints.push([px, py]);
    }
  });

  if (curvePoints.length >= 2) {
    var pathD = catmullRomPath(curvePoints);

    // Filled area (curve → left edge)
    var fillD = pathD +
      ' L' + curveMinX + ',' + curvePoints[curvePoints.length - 1][1].toFixed(1) +
      ' L' + curveMinX + ',' + curvePoints[0][1].toFixed(1) + ' Z';
    svg += '<path class="energy-fill" d="' + fillD + '"/>';

    // Curve line — style depends on timeline state
    if (scene.timelineState === 'realtime') {
      svg += '<path class="energy-curve" d="' + pathD + '" clip-path="url(#clip-past)"/>';
      svg += '<path class="energy-curve predictive" d="' + pathD + '" clip-path="url(#clip-future)"/>';
    } else if (scene.timelineState === 'predictive') {
      svg += '<path class="energy-curve predictive" d="' + pathD + '"/>';
    } else {
      svg += '<path class="energy-curve" d="' + pathD + '"/>';
    }
  }

  svg += '</svg>';
  html += svg;

  // ── Sleep info overlay ──
  if (scene.bodyData) {
    var sleepInfoY = Math.max(sleepEndH * HOUR_H / 2 - 15, 10);
    html += '<div class="v-sleep-info" style="top:' + sleepInfoY + 'px">' +
      '<div class="sleep-label">😴 睡眠 ' + scene.bodyData.sleepH + '</div>' +
      '<div class="sleep-detail">效率 ' + scene.bodyData.sleepEff + '</div></div>';
  }

  // ── High energy window labels ──
  (scene.highWindows || []).forEach(function(w) {
    var wStartMin = timeToMinutes(w.start);
    var labelY = (wStartMin / 60) * HOUR_H + 6;
    html += '<div class="v-high-label" style="top:' + labelY + 'px">' +
      '⚡ 高能 ' + w.start + '-' + w.end + '</div>';
  });

  // ── Floating pin tags (right side, PRD §6.2 + §7.4 因果式文案) ──
  (scene.suggestions || []).forEach(function(p, idx) {
    var pMin = timeToMinutes(p.time.split(' ')[0]);
    var pinY = (pMin / 60) * HOUR_H;
    var cause = deriveCause(p);
    var causeHtml = cause ? '<span class="pin-tag-cause">· ' + cause + '</span>' : '';
    html += '<div class="v-pin-tag ' + p.status + '" style="top:' + pinY + 'px" ' +
              'onclick="togglePinAlt(this, \'' + (p.id || 's' + idx) + '\', \'' + p.label + '\')">' +
      '<span class="pin-tag-icon">' + p.icon + '</span>' +
      '<span class="pin-tag-label">' + p.label + '</span>' + causeHtml +
      '</div>';
  });

  // ── Current time marker ──
  if (scene.timelineState === 'realtime') {
    var nowY = (curMin / 60) * HOUR_H;
    html += '<div class="v-now-marker" style="position:absolute;left:38px;right:0;top:' +
      nowY + 'px"><span class="v-now-label">现在</span></div>';
  }

  // ── Sleep window card ──
  if (swTime !== '--:--') {
    var swCardY = swH * HOUR_H + 8;
    html += '<div class="v-sleep-window" style="top:' + swCardY + 'px">' +
      '<span class="sw-icon">🌙</span><div>' +
      '<div class="sw-text">入睡窗口 <strong>' + swTime + '</strong></div>' +
      '<div class="sw-predict">' + scene.sleepWindow.predict + '</div>' +
      '</div></div>';
  }

  container.style.height = totalPx + 60 + 'px';
  container.innerHTML = html;
}

// ══════════════════════════════════════════
// TAB SWITCHING
// ══════════════════════════════════════════
var currentTab = 'status';

// ══════════════════════════════════════════
// 今日安排描述 → 生成建议 → 勾选接受（PRD §7.6）
// ══════════════════════════════════════════
var PLAN_STATE = {
  mode: 'idle',        // idle | input | generating | ready
  lastInput: '',
  suggestions: [],
  generateTimer: null
};

// Demo 生成器：根据关键字返回一组假建议
function mockGenerateSuggestions(text) {
  if (/会议|开会|汇报|演讲/.test(text)) {
    return [
      { id: 'g1', icon: '☕', label: '喝咖啡', time: '13:30', cause: '保住会议前高能', impact_h: 0.3, checked: true },
      { id: 'g2', icon: '😴', label: '小睡',   time: '12:40', cause: '填平会议前低谷', impact_h: 0.2, checked: true },
      { id: 'g3', icon: '🧘', label: '冥想',   time: '14:50', cause: '会议前稳定情绪', impact_h: 0.1, checked: true }
    ];
  }
  if (/加班|熬夜|晚上|夜/.test(text)) {
    return [
      { id: 'g1', icon: '☕', label: '喝咖啡',   time: '16:30', cause: '续力晚间加班',   impact_h: 0.4, checked: true },
      { id: 'g2', icon: '🍚', label: '轻食晚餐', time: '18:30', cause: '避免餐后困倦',   impact_h: 0.2, checked: true },
      { id: 'g3', icon: '🌙', label: '延后入睡', time: '00:30', cause: '匹配加班节奏',   impact_h: -0.3, checked: true }
    ];
  }
  if (/运动|跑步|健身/.test(text)) {
    return [
      { id: 'g1', icon: '💧', label: '补水', time: '15:30', cause: '运动前准备', impact_h: 0.1, checked: true },
      { id: 'g2', icon: '🍎', label: '轻食', time: '16:00', cause: '运动前补能', impact_h: 0.2, checked: true },
      { id: 'g3', icon: '😴', label: '早睡', time: '22:30', cause: '运动后恢复', impact_h: 0.3, checked: true }
    ];
  }
  if (/昨天|上周/.test(text)) {
    return [
      { id: 'g1', icon: '☕', label: '喝咖啡', time: '10:00', cause: '沿用昨日节奏',     impact_h: 0.3, checked: true },
      { id: 'g2', icon: '🏃', label: '散步',   time: '17:30', cause: '沿用晚间活动节奏', impact_h: 0.3, checked: true }
    ];
  }
  return [
    { id: 'g1', icon: '☕', label: '喝咖啡', time: '10:30', cause: '保住上午高能', impact_h: 0.3, checked: true },
    { id: 'g2', icon: '😴', label: '小睡',   time: '13:00', cause: '填平下午低谷', impact_h: 0.2, checked: true },
    { id: 'g3', icon: '🏃', label: '散步',   time: '17:30', cause: '延长晚间高能', impact_h: 0.4, checked: true }
  ];
}

function renderDockChips() {
  var chips = $('today-dock-chips');
  if (!chips) return;
  // dock chips 与半层 chips 互斥（PRD §7.6.3）：半层打开时 dock 收起
  var sheetOpen = $('plan-sheet-mask') && $('plan-sheet-mask').classList.contains('open');
  // 无历史数据时 chips 不显示（PRD §7.6.2）
  var hasHistory = currentScene && currentScene.energyCurve && currentScene.energyCurve.length > 0;
  if (!hasHistory || sheetOpen) {
    chips.innerHTML = '';
  } else {
    var weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    var wd = weekdays[new Date().getDay()];
    // dock chips 用 "+" 前缀表示"添加动作"（PRD §7.6.2.2）
    chips.innerHTML =
      '<span class="today-dock-chip" onclick="useChip(\'yesterday\')"><span class="today-dock-chip-prefix">+</span>和昨天一样</span>' +
      '<span class="today-dock-chip" onclick="useChip(\'lastweek\')"><span class="today-dock-chip-prefix">+</span>和上周' + wd + '一样</span>';
  }
  // 同步到半层里的 chips（半层内仍展示为可快速填充的备选，保持纯文字无前缀）
  var sheetChips = $('plan-input-chips');
  if (sheetChips) {
    if (!hasHistory) {
      sheetChips.innerHTML = '';
    } else {
      var wd2 = ['日','一','二','三','四','五','六'][new Date().getDay()];
      sheetChips.innerHTML =
        '<span class="today-dock-chip" onclick="useChip(\'yesterday\')">和昨天一样</span>' +
        '<span class="today-dock-chip" onclick="useChip(\'lastweek\')">和上周' + wd2 + '一样</span>';
    }
  }
}

function useChip(type) {
  var weekdays = ['日', '一', '二', '三', '四', '五', '六'];
  var wd = weekdays[new Date().getDay()];
  var text = type === 'yesterday' ? '和昨天一样' : '和上周' + wd + '一样';
  openPlanSheet('input');
  $('plan-input-textarea').value = text;
  triggerGenerate();
}

function openPlanSheet(mode, voiceHint) {
  var mask = $('plan-sheet-mask');
  var desiredMode = mode || 'input';
  mask.classList.add('open');
  // 半层打开 → dock chips 收起（PRD §7.6.3 exclusivity）
  renderDockChips();

  // 二次输入空白重开（PRD §7.6.6）：只有 idle → input 时才清
  if (desiredMode === 'input' && PLAN_STATE.mode !== 'generating' && PLAN_STATE.mode !== 'ready') {
    $('plan-input-textarea').value = '';
    PLAN_STATE.lastInput = '';
    PLAN_STATE.suggestions = [];
    PLAN_STATE.mode = 'input';
  }
  setPlanSheetMode(desiredMode);
  if (desiredMode === 'input') {
    setTimeout(function(){ var ta = $('plan-input-textarea'); if (ta) ta.focus(); }, 260);
  }
  if (voiceHint) {
    setTimeout(function(){
      $('plan-input-textarea').value = '（demo 语音）下午 3 点有重要会议';
    }, 300);
  }
}

function reopenPlanSheet() {
  var m = PLAN_STATE.mode;
  if (m === 'generating') openPlanSheet('generating');
  else if (m === 'ready') { openPlanSheet('confirm'); renderSuggestionList(); }
  else openPlanSheet('input');
}

function collapsePlanSheet() {
  $('plan-sheet-mask').classList.remove('open');
  updateDockState();
  // 半层收起 → dock chips 恢复（PRD §7.6.3）
  renderDockChips();
}

function setPlanSheetMode(mode) {
  var sheet = $('plan-sheet');
  sheet.classList.remove('mode-input', 'mode-generating', 'mode-confirm');
  document.querySelectorAll('#plan-sheet-footer > button').forEach(function(b){ b.style.display = 'none'; });
  if (mode === 'input') {
    sheet.classList.add('mode-input');
    $('plan-sheet-title').textContent = '今天有什么特别安排？';
    $('plan-btn-generate').style.display = 'block';
    renderDockChips();
  } else if (mode === 'generating') {
    sheet.classList.add('mode-generating');
    $('plan-sheet-title').textContent = '正在生成建议...';
  } else if (mode === 'confirm') {
    sheet.classList.add('mode-confirm');
    $('plan-sheet-title').textContent = '这些建议可以吗？';
    document.querySelectorAll('#plan-sheet-footer > button[data-mode="confirm"]').forEach(function(b){ b.style.display = 'block'; });
  }
}

function triggerGenerate() {
  var ta = $('plan-input-textarea');
  var text = (ta.value || '').trim();
  if (!text) { ta.focus(); return; }
  PLAN_STATE.lastInput = text;
  PLAN_STATE.mode = 'generating';
  setPlanSheetMode('generating');
  if (PLAN_STATE.generateTimer) clearTimeout(PLAN_STATE.generateTimer);
  PLAN_STATE.generateTimer = setTimeout(function() {
    PLAN_STATE.suggestions = mockGenerateSuggestions(text);
    PLAN_STATE.mode = 'ready';
    if ($('plan-sheet-mask').classList.contains('open')) {
      setPlanSheetMode('confirm');
      renderSuggestionList();
    }
    updateDockState();
  }, 1800);
}

function renderSuggestionList() {
  var list = $('plan-sugg-list');
  var echo = $('plan-confirm-echo');
  var count = $('plan-confirm-count');
  var toggle = $('plan-confirm-toggle');
  if (!list) return;
  echo.innerHTML = '基于「<b>' + (PLAN_STATE.lastInput || '你的输入') + '</b>」生成';
  var sugs = PLAN_STATE.suggestions;
  count.textContent = sugs.length + ' 条建议 · 默认全部勾选';
  var allChecked = sugs.length > 0 && sugs.every(function(s){ return s.checked; });
  toggle.textContent = allChecked ? '全不选' : '全选';
  list.innerHTML = sugs.map(function(s) {
    var sign = (s.impact_h != null) ? (s.impact_h >= 0 ? '+' : '') : '';
    var impact = (s.impact_h != null) ? ('能量 ' + sign + s.impact_h + 'h') : '';
    return '<div class="plan-sugg-row" data-id="' + s.id + '">' +
      '<div class="plan-sugg-check ' + (s.checked ? 'checked' : '') + '" onclick="toggleSuggestion(\'' + s.id + '\')"></div>' +
      '<div class="plan-sugg-content">' +
        '<div class="plan-sugg-top">' +
          '<span class="plan-sugg-icon">' + s.icon + '</span>' +
          '<span class="plan-sugg-time">' + s.time + '</span>' +
          '<span class="plan-sugg-label">' + s.label + '</span>' +
        '</div>' +
        '<div class="plan-sugg-cause">' + (s.cause || '') + '</div>' +
        (impact ? '<div class="plan-sugg-impact">' + impact + '</div>' : '') +
      '</div>' +
    '</div>';
  }).join('');
  updateAcceptBtnLabel();
}

function toggleSuggestion(id) {
  PLAN_STATE.suggestions.forEach(function(s){ if (s.id === id) s.checked = !s.checked; });
  renderSuggestionList();
}

function togglePlanAll() {
  var allChecked = PLAN_STATE.suggestions.every(function(s){ return s.checked; });
  PLAN_STATE.suggestions.forEach(function(s){ s.checked = !allChecked; });
  renderSuggestionList();
}

function updateAcceptBtnLabel() {
  var n = PLAN_STATE.suggestions.filter(function(s){ return s.checked; }).length;
  var btn = $('plan-btn-accept');
  btn.textContent = n > 0 ? '接受勾选的 ' + n + ' 条' : '请勾选至少一条';
  btn.disabled = n === 0;
}

function redescribePlan() {
  PLAN_STATE.suggestions = [];
  PLAN_STATE.lastInput = '';
  PLAN_STATE.mode = 'input';
  var ta = $('plan-input-textarea');
  if (ta) { ta.value = ''; setTimeout(function(){ ta.focus(); }, 200); }
  setPlanSheetMode('input');
  updateDockState();
}

function dropAllSuggestions() {
  PLAN_STATE.suggestions = [];
  PLAN_STATE.lastInput = '';
  PLAN_STATE.mode = 'idle';
  $('plan-sheet-mask').classList.remove('open');
  updateDockState();
}

function acceptPlanSuggestions() {
  var accepted = PLAN_STATE.suggestions.filter(function(s){ return s.checked; });
  if (!accepted.length) return;
  if (currentScene && currentScene.suggestions) {
    accepted.forEach(function(s) {
      currentScene.suggestions.push({
        id: 'user_' + s.id + '_' + Date.now(),
        icon: s.icon, label: s.label, time: s.time,
        dosage: null, reason: s.cause, impact_h: s.impact_h, status: 'pending'
      });
    });
    renderVerticalTimeline(currentScene);
  }
  PLAN_STATE.suggestions = [];
  PLAN_STATE.lastInput = '';
  PLAN_STATE.mode = 'idle';
  $('plan-sheet-mask').classList.remove('open');
  updateDockState();
}

function updateDockState() {
  var dock = $('today-dock');
  if (!dock) return;
  dock.classList.remove('state-generating', 'state-ready');
  var txt = $('today-dock-collapsed-text');
  var cta = $('today-dock-collapsed-cta');
  if (PLAN_STATE.mode === 'generating') {
    dock.classList.add('state-generating');
    txt.innerHTML = '<span class="dock-spin"></span>正在生成建议...';
    cta.textContent = '';
  } else if (PLAN_STATE.mode === 'ready') {
    dock.classList.add('state-ready');
    txt.innerHTML = '✨ 建议已生成 · ' + PLAN_STATE.suggestions.length + ' 条';
    cta.textContent = '查看 →';
  }
}

// ══════════════════════════════════════════
// Pin 的"试试另一个"对比浮层（PRD §7.5）
// ══════════════════════════════════════════
var PIN_ALTERNATIVES = {
  '喝咖啡': [
    { label: '当前建议：这个时间 1 杯', delta: '上午 +0.3h' },
    { label: '不喝',                    delta: '持平' },
    { label: '改绿茶',                  delta: '上午 +0.1h' },
    { label: '14:00 再喝',              delta: '入睡延迟 30min（不建议）' }
  ],
  '运动': [
    { label: '当前建议：17:00 有氧 30min', delta: '晚间 +0.5h' },
    { label: '不运动',                     delta: '晚间 持平' },
    { label: '改 20:00 力量',              delta: '入睡延迟 40min' }
  ],
  '小睡': [
    { label: '当前建议：20min',  delta: '下午 +0.2h' },
    { label: '不小睡',            delta: '下午 持平' },
    { label: '改 40min',          delta: '下午 +0.1h，入睡延迟 15min' }
  ],
  '冥想': [
    { label: '当前建议：10min', delta: '入睡更快 8min' },
    { label: '不冥想',           delta: '持平' }
  ],
  '准备入睡': [
    { label: '当前建议：22:30',  delta: '明日高能 7.8h' },
    { label: '延后 30min',        delta: '明日 7.5h（-0.3h）' },
    { label: '延后 1h',           delta: '明日 7.1h（-0.7h）' }
  ]
};
function togglePinAlt(el, pid, label) {
  // 关闭其他已开的浮层
  var existing = document.querySelector('.pin-alt-popover.open');
  if (existing) existing.remove();
  if (existing && existing.dataset.pid === pid) return;

  var alts = PIN_ALTERNATIVES[label];
  if (!alts) return;
  var rowsHtml = alts.map(function(a) {
    return '<div class="pin-alt-row"><span>' + a.label + '</span>' +
      '<span class="alt-delta">' + a.delta + '</span></div>';
  }).join('');
  var pop = document.createElement('div');
  pop.className = 'pin-alt-popover open';
  pop.dataset.pid = pid;
  pop.innerHTML =
    '<div class="pin-alt-popover-title">试试另一个 · ' + label + '</div>' +
    rowsHtml;
  // 放在 pin 下方
  var top = parseFloat(el.style.top) + 30;
  pop.style.top = top + 'px';
  el.parentNode.appendChild(pop);
  // 点击空白关闭
  setTimeout(function() {
    var off = function(e) {
      if (!pop.contains(e.target) && e.target !== el) {
        pop.remove();
        document.removeEventListener('click', off, true);
      }
    };
    document.addEventListener('click', off, true);
  }, 0);
}

function switchTab(tabName) {
  currentTab = tabName;

  // Update phone tab bar
  document.querySelectorAll('.tab-bar-item').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tabName);
  });
  var pill = $('tab-pill');
  if (tabName === 'today') pill.classList.add('right');
  else pill.classList.remove('right');

  // Toggle content
  $('tab-status').classList.toggle('active', tabName === 'status');
  $('tab-today').classList.toggle('active', tabName === 'today');

  // 今日 Tab 专属：吸底 dock 显示 + chips 渲染；离开今日自动收起半层
  var phone = $('phone');
  if (phone) phone.classList.toggle('on-today', tabName === 'today');
  if (tabName === 'today') {
    renderDockChips();
    updateDockState();
  } else {
    var mask = $('plan-sheet-mask');
    if (mask) mask.classList.remove('open');
  }

  // Update control panel toggle buttons
  document.querySelectorAll('.tab-toggle-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab === tabName);
  });
}

// ══════════════════════════════════════════
// APPLY SCENE (master orchestrator)
// ══════════════════════════════════════════
var currentScene = null;

function applyScene(scene) {
  currentScene = scene;
  var phone = $('phone');

  // Time & greeting
  $('sys-time').textContent = scene.time;
  $('greeting').textContent = scene.greeting;

  // Day / Night mode
  if (scene.isNight) {
    phone.classList.add('night-mode');
  } else {
    phone.classList.remove('night-mode');
  }

  // ── Status Tab ──
  if (scene.isNight && scene.sleepReadiness) {
    renderNightCoreMetric(scene);
  } else {
    renderDayCoreMetric(scene);
  }
  renderStatusCard(scene);
  renderBodyData(scene);
  renderQuestionsDock(scene);

  // ── Today Tab ──
  renderTodayCoreCapsule(scene);
  renderVerticalTimeline(scene);
  // 重置安排输入状态（切 scene = 切"今天"，清空上一条输入与生成结果）
  PLAN_STATE.mode = 'idle';
  PLAN_STATE.lastInput = '';
  PLAN_STATE.suggestions = [];
  if (PLAN_STATE.generateTimer) { clearTimeout(PLAN_STATE.generateTimer); PLAN_STATE.generateTimer = null; }
  renderDockChips();
  updateDockState();

  // Default to status tab
  switchTab('status');
}

// ══════════════════════════════════════════
// CONTROL PANEL: Generate Scene Buttons
// ══════════════════════════════════════════
(function init() {
  var btnGroup = $('scene-buttons');
  SCENES.forEach(function(scene, i) {
    var btn = document.createElement('button');
    btn.className = 'scene-btn' + (i === 0 ? ' active' : '');
    btn.innerHTML = scene.name + '<span>' + scene.desc + '</span>';
    btn.addEventListener('click', function() {
      document.querySelectorAll('.scene-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      applyScene(scene);
    });
    btnGroup.appendChild(btn);
  });

  // Apply first scene
  applyScene(SCENES[0]);
})();
</script>
