// ─── Rolling number (slot-machine interpolation) ───────────
function RollingNumber({ value, duration = 800 }) {
  const target = String(value ?? '');
  const [, force] = useState(0);
  const ref = useRef({ display: target, target, raf: null, startTs: 0, from: target });

  if (ref.current.target !== target) {
    const prevDisplay = ref.current.display;
    const fromN = parseInt(prevDisplay, 10);
    const toN = parseInt(target, 10);
    if (Number.isFinite(fromN) && Number.isFinite(toN)) {
      ref.current.target = target;
      ref.current.from = prevDisplay;
      ref.current.startTs = performance.now();
      if (ref.current.raf) cancelAnimationFrame(ref.current.raf);
      const pad = target.length;
      const tick = () => {
        const t = Math.min(1, (performance.now() - ref.current.startTs) / duration);
        const e = 1 - Math.pow(1 - t, 3);
        const fr = parseInt(ref.current.from, 10);
        const to = parseInt(ref.current.target, 10);
        const cur = Math.round(fr + (to - fr) * e);
        ref.current.display = String(cur).padStart(pad, ' ').replace(/ /g, '\u00a0');
        force(n => n + 1);
        if (t < 1) {
          ref.current.raf = requestAnimationFrame(tick);
        } else {
          ref.current.display = ref.current.target;
          ref.current.raf = null;
          force(n => n + 1);
        }
      };
      ref.current.raf = requestAnimationFrame(tick);
    } else {
      ref.current.target = target;
      ref.current.display = target;
    }
  }

  useEffect(() => () => {
    if (ref.current.raf) cancelAnimationFrame(ref.current.raf);
  }, []);

  return <span style={{ fontVariantNumeric: 'tabular-nums' }}>{ref.current.display}</span>;
}

// ─── StreamText: char-by-char blur→focus ───────────────────
function StreamText({ text, start = 0, duration = 900, style, active }) {
  const [elapsed, setElapsed] = useState(0);
  useEffect(() => {
    if (!active) return;
    const startTs = performance.now();
    let raf;
    const tick = () => {
      setElapsed(performance.now() - startTs);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [active]);
  const localT = Math.max(0, elapsed - start);
  const chars = Array.from(text || '');
  const perChar = duration / Math.max(1, chars.length);
  return (
    <div style={style}>
      {chars.map((c, i) => {
        const cs = i * perChar;
        const p = Math.max(0, Math.min(1, (localT - cs) / (perChar * 3.5)));
        return (
          <span key={i} style={{
            opacity: p, filter: `blur(${(1 - p) * 3}px)`,
            whiteSpace: 'pre'
          }}>{c}</span>
        );
      })}
    </div>
  );
}

// ─── Reveal: fade + slide-up on delay ──────────────────────
function Reveal({ delay, active, children, y = 12, duration = 520 }) {
  const [shown, setShown] = useState(false);
  useEffect(() => {
    if (!active) { setShown(false); return; }
    const t = setTimeout(() => setShown(true), delay);
    return () => clearTimeout(t);
  }, [active, delay]);
  return (
    <div style={{
      opacity: shown ? 1 : 0,
      transform: shown ? 'translateY(0)' : `translateY(${y}px)`,
      transition: `opacity ${duration}ms ease, transform ${duration}ms cubic-bezier(.2,.7,.2,1)`
    }}>{children}</div>
  );
}

// ─── Attribution card: 3-zone deviation gauge ──────────────
function AttributionCard({ metric: a }) {
  const [lo, hi] = a.normal;
  const v = a.value;
  const above = v > hi;
  const below = v < lo;
  const abnormal = above || below;

  const chartH = 40, chartW = 100;
  const zoneH = chartH / 3;
  const highTop = 0,          highBot = zoneH;
  const normTop = zoneH,      normBot = 2 * zoneH;
  const lowTop  = 2 * zoneH,  lowBot  = chartH;
  const edgePad = 3;
  const devAbove = above ? Math.min(1, (v - hi) / Math.max(1, 100 - hi)) : 0;
  const devBelow = below ? Math.min(1, (lo - v) / Math.max(1, lo)) : 0;

  let dotY;
  if (above) dotY = highBot - devAbove * (highBot - (highTop + edgePad));
  else if (below) dotY = lowTop + devBelow * ((lowBot - edgePad) - lowTop);
  else dotY = (normTop + normBot) / 2;

  const dotColor = abnormal ? WARN : LIGHT;
  const dotCx = chartW / 2;
  const normalFill   = 'rgba(245,245,242,0.14)';
  const normalBorder = 'rgba(245,245,242,0.55)';
  const zoneFill     = 'rgba(245,245,242,0.02)';
  const uid = React.useId();

  return (
    <div style={{
      background: 'rgba(245,245,242,0.04)',
      border: '1px solid rgba(245,245,242,0.08)',
      borderRadius: 12, padding: '10px 12px',
      display: 'flex', flexDirection: 'column', gap: 6,
    }}>
      <div style={{
        fontFamily: FF_SC, fontSize: 12, color: LIGHT,
        lineHeight: 1.2, letterSpacing: 0.5,
      }}>{a.name}</div>
      <div style={{ position: 'relative', height: chartH }}>
        <svg width="100%" height="100%" viewBox={`0 0 ${chartW} ${chartH}`}
          preserveAspectRatio="none"
          style={{ position: 'absolute', inset: 0, overflow: 'visible' }}>
          <defs>
            <radialGradient id={`glow-${uid}`} cx="50%" cy="50%" r="50%">
              <stop offset="0%"   stopColor={dotColor} stopOpacity="0.5" />
              <stop offset="60%"  stopColor={dotColor} stopOpacity="0.12" />
              <stop offset="100%" stopColor={dotColor} stopOpacity="0" />
            </radialGradient>
          </defs>
          <rect x="0" y={highTop} width={chartW} height={highBot - highTop} fill={zoneFill} />
          <rect x="0" y={normTop} width={chartW} height={normBot - normTop} fill={normalFill} />
          <rect x="0" y={lowTop}  width={chartW} height={lowBot  - lowTop}  fill={zoneFill} />
          <line x1="0" y1={normTop} x2={chartW} y2={normTop}
            stroke={normalBorder} strokeWidth="0.8" vectorEffect="non-scaling-stroke" />
          <line x1="0" y1={normBot} x2={chartW} y2={normBot}
            stroke={normalBorder} strokeWidth="0.8" vectorEffect="non-scaling-stroke" />
          <circle cx={dotCx} cy={dotY} r="10" fill={`url(#glow-${uid})`} />
          <circle cx={dotCx} cy={dotY} r="2.4" fill={dotColor}
            style={{ filter: `drop-shadow(0 0 4px ${dotColor})` }} />
        </svg>
      </div>
    </div>
  );
}

// ─── Intro timeline: loading → roll → stage1 → thinking → stage2 → done
const ANIM = {
  numberRollStart: 2200,
  sleepModeStart: 3200,
  stage1Start: 3800,
  thinking: 4800,
  analysisStart: 5400,
  done: 8400
};

function useIntroTimeline(replayKey) {
  const [phase, setPhase] = useState('loading');
  const [dataRevealed, setDataRevealed] = useState(false);
  const [sleepMode, setSleepMode] = useState(false);
  const [showStage1, setShowStage1] = useState(false);
  const [showStage2, setShowStage2] = useState(false);

  useEffect(() => {
    setPhase('loading');
    setDataRevealed(false);
    setSleepMode(false);
    setShowStage1(false);
    setShowStage2(false);
    const timers = [];
    timers.push(setTimeout(() => setDataRevealed(true),  ANIM.numberRollStart));
    timers.push(setTimeout(() => setSleepMode(true),     ANIM.sleepModeStart));
    timers.push(setTimeout(() => setShowStage1(true),    ANIM.stage1Start));
    timers.push(setTimeout(() => setPhase('thinking'),   ANIM.thinking));
    timers.push(setTimeout(() => setShowStage2(true),    ANIM.analysisStart));
    timers.push(setTimeout(() => setPhase('done'),       ANIM.done));
    return () => timers.forEach(clearTimeout);
  }, [replayKey]);

  return { phase, dataRevealed, sleepMode, showStage1, showStage2 };
}

// ─── Home narrative cluster (tagline + attribution + analysis + hashes)
function HomeCluster({ energy, timeline, sleep, onHash }) {
  const { showStage1, showStage2 } = timeline;
  const source = sleep ? {
    key: `${energy.key}-sleep`,
    tagline: sleep.tagline,
    attribution: energy.attribution || [],
    analysis: sleep.analysis,
    hashes: sleep.hashes,
  } : {
    key: energy.key,
    tagline: energy.tagline,
    attribution: energy.attribution,
    analysis: energy.analysis,
    hashes: energy.hashes,
  };

  const taglineStyle = {
    fontFamily: FF_SERIF, fontSize: 24, fontStyle: 'italic',
    color: LIGHT, padding: '0 24px 14px', letterSpacing: 0.2,
    minHeight: 32
  };
  const analysisStyle = {
    fontFamily: '"Noto Serif SC", serif', fontSize: 13, lineHeight: '24px',
    color: 'rgba(245,245,242,0.82)', letterSpacing: 0.3, minHeight: 48
  };

  return (
    <>
      {showStage1 && (
        <StreamText
          key={`tag-${source.key}`}
          text={source.tagline}
          duration={900}
          style={taglineStyle}
          active={showStage1}
        />
      )}

      {showStage1 && (
        <div style={{ padding: '0 20px' }}>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
            {source.attribution.map((m, i) => (
              <Reveal
                key={`attr-${source.key}-${i}`}
                active={showStage1}
                delay={200 + i * 160}
                y={14}
              >
                <AttributionCard metric={m} />
              </Reveal>
            ))}
          </div>
        </div>
      )}

      {showStage2 && (
        <div style={{ color: '#E5E5E0', padding: '16px 24px 28px' }}>
          <StreamText
            key={`ana-${source.key}`}
            text={source.analysis}
            duration={1800}
            style={analysisStyle}
            active={showStage2}
          />
          <div style={{ marginTop: 14, display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {source.hashes.map((h, i) => (
              <Reveal
                key={`hash-${source.key}-${i}`}
                active={showStage2}
                delay={1400 + i * 140}
                y={10}
              >
                <button onClick={() => onHash && onHash(h)} style={{
                  background: 'transparent', border: '1px solid rgba(245,245,242,0.22)',
                  color: '#E5E5E0', borderRadius: 100, padding: '5px 11px',
                  fontFamily: FF_SC, fontSize: 11, cursor: 'pointer'
                }}>→ {h}</button>
              </Reveal>
            ))}
          </div>
        </div>
      )}
    </>
  );
}

// ─── Heart-rate entry (bottom of Hero — body-data drill-down) ──
function HeartRateEntry({ sleepMode }) {
  const color = sleepMode ? SLEEP : LIGHT;
  const bpm = sleepMode ? 52 : 72;
  const w = 260, h = 44;
  const pts = [
    [0,22],[20,22],[26,22],[34,14],[40,32],[46,6],[52,34],[58,22],
    [90,22],[110,22],[118,18],[124,26],[130,22],
    [160,22],[180,22],[188,22],[196,14],[202,32],[208,6],[214,34],[220,22],
    [w,22]
  ];
  const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0]} ${p[1]}`).join(' ');
  return (
    <div style={{
      margin: '0 20px 22px', padding: '12px 16px',
      background: 'rgba(245,245,242,0.05)',
      border: '1px solid rgba(245,245,242,0.08)',
      borderRadius: 14, display: 'flex', alignItems: 'center', gap: 12,
      cursor: 'pointer'
    }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 2, minWidth: 56 }}>
        <div style={{ fontFamily: FF_SC, fontSize: 10, color: 'rgba(245,245,242,0.55)', letterSpacing: 1.5 }}>心率</div>
        <div style={{ fontFamily: FF_SERIF, fontSize: 22, color: LIGHT, lineHeight: 1 }}>
          {bpm}<span style={{ fontSize: 11, fontStyle: 'italic', marginLeft: 4, color: 'rgba(245,245,242,0.6)' }}>bpm</span>
        </div>
      </div>
      <div style={{ flex: 1 }}>
        <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
          <path d={d} fill="none" stroke={color} strokeWidth="1.2"
            vectorEffect="non-scaling-stroke" opacity="0.88"
            style={{ filter: `drop-shadow(0 0 3px ${color})` }} />
        </svg>
      </div>
      <div style={{
        fontFamily: FF_SC, fontSize: 18, color: 'rgba(245,245,242,0.55)', lineHeight: 1
      }}>›</div>
    </div>
  );
}

// ─── Minimal timeline page (点击主指标展开) ──────────────────
function TimelinePage({ energy, onBack }) {
  const color = ENERGY_COLOR[energy.key] || GREEN;
  const hours = [];
  for (let h = 6; h <= 24; h += 2) hours.push(h);
  const W = 380, H = 720;
  const leftPad = 54, rightPad = 28, topPad = 120, botPad = 60;
  const plotW = W - leftPad - rightPad;
  const plotH = H - topPad - botPad;

  const seed = [0.12, 0.28, 0.58, 0.82, 0.78, 0.92, 0.74, 0.62, 0.48, 0.36];
  const pts = seed.map((v, i) => {
    const y = topPad + (i / (seed.length - 1)) * plotH;
    const x = leftPad + v * plotW;
    return [x, y];
  });

  let d = '';
  pts.forEach((p, i) => {
    if (i === 0) { d += `M ${p[0]} ${p[1]}`; return; }
    const prev = pts[i - 1];
    const cy1 = prev[1] + (p[1] - prev[1]) * 0.5;
    const cy2 = cy1;
    d += ` C ${prev[0]} ${cy1}, ${p[0]} ${cy2}, ${p[0]} ${p[1]}`;
  });

  const nowY = topPad + plotH * 0.55;
  const nowX = leftPad + plotW * 0.82;

  return (
    <div style={{
      position: 'absolute', inset: 0, background: DARK_BG, color: LIGHT, zIndex: 100,
      display: 'flex', flexDirection: 'column'
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 10,
        padding: '62px 22px 6px'
      }}>
        <button onClick={onBack} style={{
          background: 'transparent', border: 'none', color: LIGHT,
          fontSize: 20, cursor: 'pointer', padding: 4, lineHeight: 1
        }}>‹</button>
        <div style={{ fontFamily: FF_SC, fontSize: 12, color: 'rgba(245,245,242,0.55)', letterSpacing: 2 }}>今日时间轴</div>
        <div style={{ flex: 1 }} />
        <div style={{ fontFamily: FF_SC, fontSize: 11, color: 'rgba(245,245,242,0.55)' }}>
          高能 <span style={{ color: LIGHT }}>{energy.h}{energy.unit ? energy.unit : 'h ' + energy.m + 'm'}</span>
        </div>
      </div>
      <div style={{ flex: 1, position: 'relative' }}>
        <svg width="100%" height="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
          {hours.map(h => {
            const y = topPad + ((h - 6) / 18) * plotH;
            return (
              <g key={h}>
                <text x={leftPad - 10} y={y + 4}
                  textAnchor="end"
                  fontFamily={FF_SC} fontSize="10"
                  fill="rgba(245,245,242,0.4)">{h}:00</text>
                <line x1={leftPad} y1={y} x2={W - rightPad} y2={y}
                  stroke="rgba(245,245,242,0.06)" strokeWidth="0.6" />
              </g>
            );
          })}
          <path d={d} fill="none" stroke={color} strokeWidth="1.6"
            vectorEffect="non-scaling-stroke" opacity="0.92"
            style={{ filter: `drop-shadow(0 0 6px ${color})` }} />
          <line x1={leftPad} y1={nowY} x2={W - rightPad} y2={nowY}
            stroke={LIGHT} strokeWidth="0.5" strokeDasharray="3 3" opacity="0.5" />
          <circle cx={nowX} cy={nowY} r="4" fill={LIGHT}
            style={{ filter: `drop-shadow(0 0 4px ${color})` }} />
          <text x={W - rightPad} y={nowY - 8}
            textAnchor="end"
            fontFamily={FF_SC} fontSize="10" fill="rgba(245,245,242,0.75)">now</text>
        </svg>
      </div>
    </div>
  );
}

// ─── App ───────────────────────────────────────────────────
function App() {
  const [energyKey, setEnergyKey] = useState(window.__TWEAKS?.energyState || 'morning');
  const [replay, setReplay] = useState(0);
  const [timelineOpen, setTimelineOpen] = useState(false);

  const energyData = ENERGY_STATES[energyKey] || ENERGY_STATES.morning;
  const energy = { ...energyData, key: energyKey };

  const timeline = useIntroTimeline(`${energyKey}-${replay}`);
  const sleep = energyKey === 'zero' ? energyData.sleep : null;
  const sleepMode = !!(sleep && timeline.sleepMode);

  useEffect(() => {
    const panel = document.getElementById('energyState');
    if (!panel) return;
    const update = () => {
      panel.querySelectorAll('button').forEach(b => {
        b.classList.toggle('active', b.dataset.v === energyKey);
      });
    };
    update();
    const onClick = (e) => {
      const btn = e.target.closest('button[data-v]');
      if (!btn) return;
      setEnergyKey(btn.dataset.v);
      setReplay(n => n + 1);
      setTimelineOpen(false);
    };
    panel.addEventListener('click', onClick);
    return () => panel.removeEventListener('click', onClick);
  }, [energyKey]);

  useEffect(() => {
    const btn = document.getElementById('replayBtn');
    if (!btn) return;
    const onClick = () => setReplay(n => n + 1);
    btn.addEventListener('click', onClick);
    return () => btn.removeEventListener('click', onClick);
  }, []);

  const handleHeroClick = () => {
    if (timeline.phase === 'done') setTimelineOpen(true);
  };

  return (
    <div className="stage">
      <div className="title">Isho · 首页 Demo v2</div>
      <div className="subtitle">
        状态页 + 今日时间轴 · 绿 / 橙 / 透支 / 归零（归零后 3.2s 切入紫色入睡准备度）· 右下角可切换状态与重放动效
      </div>
      <div className="devices">
        <Phone scrollKey="home">
          <Hero
            energy={energy}
            revealed={timeline.dataRevealed}
            prev={energyData.prev}
            sleepMode={sleepMode}
            sleep={sleep}
            topRight={<LoadingOrb phase={timeline.phase} />}
            onHeroClick={handleHeroClick}
          >
            <HomeCluster
              energy={energy}
              timeline={timeline}
              sleep={sleepMode ? sleep : null}
            />
          </Hero>
          <div style={{ background: DARK_BG }}>
            <HeartRateEntry sleepMode={sleepMode} />
          </div>
          {timelineOpen && (
            <TimelinePage energy={energy} onBack={() => setTimelineOpen(false)} />
          )}
        </Phone>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
